# Cross-platform requirements
platforms:
  android:
    min_sdk: 26
    crypto_providers:
      - AndroidKeystore
      - fallback_java_crypto
  ios:
    min_version: 14
    crypto_providers:
      - SecurityFramework
      - fallback_java_crypto

# Module structure
modules:
  - name: meshlink
    purpose: shipped library with public API
    coverage_gate: 100%
    docs: dokka + skie
  - name: meshlink-reference
    purpose: reference app consuming public API
    target: android + ios
  - name: meshlink-proof
    purpose: real device validation
    target: android + ios
    scope: crypto provider, BLE behavior
  - name: meshlink-benchmark
    purpose: performance validation
    target: jvm + real devices

